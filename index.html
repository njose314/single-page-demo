<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deadline Dodger 💼</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; touch-action: manipulation; }
        #game-container { position: relative; width: 100vw; max-width: 100vw; height: 100vh; max-height: 100vh; overflow: hidden; box-shadow: 0 0 60px #0ff; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; image-rendering: crisp-edges; }
        #score { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); font-size: 42px; font-weight: 900; color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 20px #f0f; z-index: 20; letter-spacing: 2px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; background: rgba(0,0,0,0.85); }
        .overlay h1 { font-size: 56px; font-weight: 900; color: #0ff; margin-bottom: 4px; text-align: center; text-shadow: 0 0 15px #0ff; letter-spacing: -1px; }
        .overlay p { font-size: 18px; color: #f0f; margin-bottom: 24px; text-align: center; }
        button { padding: 18px 50px; font-size: 20px; font-weight: 800; background: #f0f; color: #000; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 0 20px #f0f; transition: all 0.1s; text-transform: uppercase; letter-spacing: 1px; }
        button:active { transform: scale(0.9); box-shadow: 0 0 10px #f0f; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="score" class="hidden">0</div>
        
        <div id="start-screen" class="overlay">
            <div style="text-align:center;">
                <div style="font-size:72px; margin-bottom:2px; color:#0ff; text-shadow:0 0 20px #0ff;">💼</div>
                <h1>DOWNWELL<br>OFFICE</h1>
                <p style="color:#fff; font-size:17px; max-width:260px;">Dodge meetings.<br>Survive the day.<br>Get promoted.</p>
                <button id="start-btn" style="margin-top:16px; font-size:21px; padding:20px 60px;">START SHIFT</button>
                <p style="margin-top:28px; font-size:14px; color:#666;">Tap anywhere or SPACE</p>
            </div>
        </div>
        
        <div id="game-over" class="overlay hidden">
            <div style="text-align:center;">
                <div style="font-size:64px; margin-bottom:6px; color:#f00; text-shadow:0 0 20px #f00;">💥</div>
                <h1 style="color:#f00; text-shadow:0 0 15px #f00;">YOU'RE FIRED!</h1>
                <p style="font-size:26px; color:#fff; margin:12px 0;">Promotions: <span id="final-score" style="color:#0f0; font-weight:900; font-size:32px;">0</span></p>
                <p style="font-size:16px; color:#666; margin-bottom:24px;">Best: <span id="high-score" style="color:#fff; font-weight:700;">0</span></p>
                <button id="restart-btn" style="background:#0f0; color:#000; box-shadow:0 0 20px #0f0;">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });
        ctx.imageSmoothingEnabled = false;
        
        let WIDTH = 0, HEIGHT = 0;
        let player = { x: 0, y: 0, vy: 0, size: 26, rot: 0 };
        let obstacles = [];
        let particles = [];
        let score = 0;
        let gameRunning = false;
        let frame = 0;
        let shake = 0;
        let firstFlap = false;
        let highScore = parseInt(localStorage.getItem('deadlineDodgerHighScore') || '0');
        
        let GRAVITY = 0.15;
        let SPEED = 0.9;
        const NORMAL_GRAVITY = 0.65;
        const NORMAL_SPEED = 2.95;
        const FLAP = -12.2;
        
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth, 480);
            const maxH = Math.min(window.innerHeight, 854);
            const aspect = 9/16;
            if (maxW / maxH > aspect) { WIDTH = maxH * aspect; HEIGHT = maxH; }
            else { WIDTH = maxW; HEIGHT = maxW / aspect; }
            canvas.width = WIDTH; canvas.height = HEIGHT;
            canvas.style.width = WIDTH + 'px'; canvas.style.height = HEIGHT + 'px';
            if (!gameRunning) { player.x = WIDTH * 0.26; player.y = HEIGHT * 0.47; }
        }
        
        function createObstacle() {
            const gap = 142;
            const minY = 78; const maxY = HEIGHT - gap - 78;
            const gapY = minY + Math.random() * (maxY - minY);
            obstacles.push({ x: WIDTH + 20, top: gapY, bottom: gapY + gap, type: Math.random() > 0.5 ? 'meeting' : 'email', scored: false });
        }
        
        function createParticles(x, y, count, color, spread = 4.5) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*spread, vy: (Math.random()-0.5)*spread - 1.6, life: 18 + Math.random()*12, color, size: 1.8 + Math.random()*2.8 });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            frame++; shake = Math.max(0, shake - 0.6);
            
            if (!firstFlap) { GRAVITY = 0.14; SPEED = 0.85; }
            else { GRAVITY = NORMAL_GRAVITY; SPEED = NORMAL_SPEED; }
            
            player.vy += GRAVITY;
            player.y += player.vy;
            player.rot = Math.max(-0.5, Math.min(0.8, player.vy * 0.03));
            
            if (player.y < player.size + 6) { player.y = player.size + 6; player.vy = 1.8; shake = 3; createParticles(player.x, player.y-8, 5, '#0ff', 3); }
            if (player.y + player.size > HEIGHT - 28) { player.y = HEIGHT - 28 - player.size; endGame(); return; }
            
            if (frame % 72 === 0) createObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i]; o.x -= SPEED;
                if (!o.scored && o.x + 56 < player.x) { o.scored = true; score++; document.getElementById('score').innerText = score; createParticles(player.x+14, player.y-5, 10, '#0f0', 4); shake = 2; }
                
                const hit = 15;
                if (player.x + hit > o.x && player.x - hit < o.x + 54) {
                    if (player.y - hit < o.top || player.y + hit > o.bottom) { shake = 10; createParticles(player.x, player.y, 20, '#f00', 5); endGame(); return; }
                }
                if (o.x < -80) obstacles.splice(i, 1);
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.18; p.life--; if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function drawDownwellMan(x, y, rot) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
            const s = 1.6;
            
            // Shadow (Downwell style)
            ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(-8*s, 15*s, 16*s, 4*s);
            
            // Legs (chunky pixel)
            ctx.fillStyle = '#0ff'; ctx.fillRect(-6*s, 2*s, 5*s, 12*s); ctx.fillRect(1*s, 2*s, 5*s, 12*s);
            
            // Body (neon cyan suit)
            ctx.fillStyle = '#0ff'; ctx.fillRect(-8*s, -10*s, 16*s, 14*s);
            ctx.fillStyle = '#f0f'; ctx.fillRect(-5*s, -7*s, 10*s, 8*s); // magenta tie
            
            // Head (simple Downwell style)
            ctx.fillStyle = '#fff'; ctx.fillRect(-5*s, -17*s, 10*s, 8*s);
            ctx.fillStyle = '#000'; ctx.fillRect(-3*s, -15*s, 2*s, 2*s); ctx.fillRect(1*s, -15*s, 2*s, 2*s); // eyes
            
            // Briefcase (bright yellow like Downwell gun)
            ctx.fillStyle = '#ff0'; ctx.fillRect(9*s, -1*s, 8*s, 7*s);
            ctx.fillStyle = '#f80'; ctx.fillRect(10*s, 1*s, 6*s, 3*s);
            
            // Arm
            ctx.fillStyle = '#fff'; ctx.fillRect(6*s, -5*s, 4*s, 6*s);
            
            ctx.restore();
        }
        
        function draw() {
            ctx.save();
            if (shake > 0) ctx.translate((Math.random()-0.5)*shake*0.9, (Math.random()-0.5)*shake*0.9);
            
            // Downwell-style black background with subtle grid
            ctx.fillStyle = '#000'; ctx.fillRect(0,0,WIDTH,HEIGHT);
            ctx.strokeStyle = 'rgba(0,255,255,0.06)'; ctx.lineWidth = 1;
            for (let x=36; x<WIDTH; x+=48) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,HEIGHT); ctx.stroke(); }
            for (let y=36; y<HEIGHT; y+=48) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(WIDTH,y); ctx.stroke(); }
            
            // Floor (neon line)
            ctx.fillStyle = '#f0f'; ctx.fillRect(0, HEIGHT-26, WIDTH, 26);
            ctx.fillStyle = '#0ff'; ctx.fillRect(0, HEIGHT-30, WIDTH, 4);
            
            // Draw obstacles (Downwell danger style)
            obstacles.forEach(o => {
                if (o.type === 'meeting') {
                    ctx.fillStyle = '#f00'; ctx.fillRect(o.x, 0, 54, o.top);
                    ctx.fillStyle = '#fff'; ctx.font = '700 9px monospace'; ctx.fillText('MEETING', o.x+5, o.top-10);
                    ctx.fillStyle = '#f00'; ctx.fillRect(o.x, o.bottom, 54, HEIGHT-o.bottom);
                } else {
                    ctx.fillStyle = '#0ff'; ctx.fillRect(o.x+4, o.top-5, 46, 28);
                    ctx.fillStyle = '#fff'; ctx.font = '700 8px monospace'; ctx.fillText('URGENT', o.x+10, o.top+9);
                }
            });
            
            // Downwell-style employee (neon cyan, chunky pixel)
            drawDownwellMan(player.x, player.y, player.rot);
            
            // Particles (Downwell style - bright neon)
            particles.forEach(p => {
                ctx.globalAlpha = Math.max(0, p.life/32);
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        
        function gameLoop() { update(); draw(); if (gameRunning) requestAnimationFrame(gameLoop); }
        
        function flap() {
            if (!gameRunning) { startGame(); return; }
            player.vy = FLAP; shake = 4;
            createParticles(player.x-5, player.y+2, 7, '#0ff', 3.5);
            if (!firstFlap) firstFlap = true;
        }
        
        function startGame() {
            resizeCanvas();
            player.x = WIDTH * 0.26; player.y = HEIGHT * 0.47; player.vy = 0; player.rot = 0;
            obstacles = []; particles = []; score = 0; frame = 0; shake = 0; firstFlap = false;
            document.getElementById('score').innerText = '0';
            document.getElementById('score').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            createObstacle(); createObstacle(); obstacles[1].x = WIDTH * 1.45;
            gameRunning = true; gameLoop();
        }
        
        function endGame() {
            gameRunning = false;
            if (score > highScore) { highScore = score; localStorage.setItem('deadlineDodgerHighScore', highScore); }
            document.getElementById('final-score').innerText = score;
            document.getElementById('high-score').innerText = highScore;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('score').classList.add('hidden');
        }
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        canvas.addEventListener('touchstart', e => {e.preventDefault(); flap();});
        canvas.addEventListener('mousedown', flap);
        document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
        window.addEventListener('resize', () => { if (!gameRunning) resizeCanvas(); });
        
        function init() { resizeCanvas(); player.x = WIDTH*0.26; player.y = HEIGHT*0.47; draw(); document.getElementById('start-screen').classList.remove('hidden'); }
        init();
    </script>
</body>
</html>
