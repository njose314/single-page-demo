<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deadline Dodger 💼</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #020617;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden; touch-action: manipulation;
        }
        #game-container {
            position: relative; width: 100vw; max-width: 100vw;
            height: 100vh; max-height: 100vh; overflow: hidden;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8);
        }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        #score {
            position: absolute; top: 22px; left: 50%; transform: translateX(-50%);
            font-size: 44px; font-weight: 900; color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.7); z-index: 20; letter-spacing: 3px;
        }
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 30; background: rgba(2, 6, 23, 0.88);
        }
        .overlay h1 { font-size: 58px; font-weight: 900; color: #fff; margin-bottom: 6px; text-align: center; letter-spacing: -2px; }
        .overlay p { font-size: 20px; color: #94a3b8; margin-bottom: 28px; text-align: center; max-width: 300px; }
        button {
            padding: 20px 56px; font-size: 21px; font-weight: 800;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white; border: none; border-radius: 9999px; cursor: pointer;
            box-shadow: 0 12px 30px rgba(59, 130, 246, 0.5);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; letter-spacing: 1.5px;
        }
        button:active { transform: scale(0.92); box-shadow: 0 6px 18px rgba(59, 130, 246, 0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="score" class="hidden">0</div>
        
        <div id="start-screen" class="overlay">
            <div style="text-align:center;">
                <div style="font-size:78px; margin-bottom:4px; filter: drop-shadow(0 10px 20px rgba(59,130,246,0.4));">💼</div>
                <h1 style="font-size:60px; color:#fff; margin-bottom:4px;">DEADLINE<br>DODGER</h1>
                <p>Dodge the meetings.<br>Survive the sprint.<br>Get that promotion.</p>
                <button id="start-btn" style="margin-top:18px; font-size:23px; padding:22px 68px;">START SHIFT</button>
                <p style="margin-top:32px; font-size:15px; color:#64748b;">Tap anywhere or press SPACE</p>
            </div>
        </div>
        
        <div id="game-over" class="overlay hidden">
            <div style="text-align:center;">
                <div style="font-size:68px; margin-bottom:8px;">😵‍💫</div>
                <h1 style="font-size:52px; color:#ef4444; margin-bottom:6px; text-shadow:0 4px 20px rgba(239,68,68,0.5);">YOU'RE FIRED!</h1>
                <p style="font-size:28px; color:#fff; margin:14px 0 6px;">Promotions: <span id="final-score" style="font-weight:900; color:#22c55e; font-size:34px;">0</span></p>
                <p style="font-size:17px; color:#64748b; margin-bottom:28px;">Personal Best: <span id="high-score" style="font-weight:700; color:#fff;">0</span></p>
                <button id="restart-btn" style="background:linear-gradient(135deg,#22c55e,#15803d); box-shadow:0 12px 30px rgba(34,197,94,0.5);">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        let WIDTH = 0, HEIGHT = 0;
        let player = { x: 0, y: 0, vy: 0, size: 30, rot: 0 };
        let obstacles = [];
        let particles = [];
        let score = 0;
        let gameRunning = false;
        let frame = 0;
        let shake = 0;
        let firstFlap = false;
        let highScore = parseInt(localStorage.getItem('deadlineDodgerHighScore') || '0');
        
        let GRAVITY = 0.18;   // super slow-mo at start
        let SPEED = 1.1;
        const NORMAL_GRAVITY = 0.68;
        const NORMAL_SPEED = 3.1;
        const FLAP = -12.8;
        
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth, 480);
            const maxH = Math.min(window.innerHeight, 854);
            const aspect = 9/16;
            if (maxW / maxH > aspect) { WIDTH = maxH * aspect; HEIGHT = maxH; }
            else { WIDTH = maxW; HEIGHT = maxW / aspect; }
            
            canvas.width = WIDTH; canvas.height = HEIGHT;
            canvas.style.width = WIDTH + 'px'; canvas.style.height = HEIGHT + 'px';
            
            if (!gameRunning) { player.x = WIDTH * 0.26; player.y = HEIGHT * 0.47; }
        }
        
        function createObstacle() {
            const gap = 148;
            const minY = 85; const maxY = HEIGHT - gap - 85;
            const gapY = minY + Math.random() * (maxY - minY);
            obstacles.push({ x: WIDTH + 25, top: gapY, bottom: gapY + gap, type: Math.random() > 0.48 ? 'meeting' : 'email', scored: false });
        }
        
        function createParticles(x, y, count, color, spread = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random()-0.5) * spread,
                    vy: (Math.random()-0.5) * spread - 1.5,
                    life: 22 + Math.random()*16,
                    color, size: 2.5 + Math.random()*3.5
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            frame++; shake = Math.max(0, shake - 0.8);
            
            // Slow-mo until first flap
            if (!firstFlap) {
                GRAVITY = 0.16; SPEED = 0.95;
            } else {
                GRAVITY = NORMAL_GRAVITY; SPEED = NORMAL_SPEED;
            }
            
            player.vy += GRAVITY;
            player.y += player.vy;
            player.rot = Math.max(-0.6, Math.min(0.9, player.vy * 0.035));
            
            // Ceiling bounce
            if (player.y < player.size + 8) {
                player.y = player.size + 8; player.vy = 2.2; shake = 5;
                createParticles(player.x, player.y - 12, 7, '#60a5fa', 4);
            }
            
            // Refined ground collision
            if (player.y + player.size > HEIGHT - 32) {
                player.y = HEIGHT - 32 - player.size; endGame(); return;
            }
            
            if (frame % 76 === 0) createObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i]; o.x -= SPEED;
                
                // Score
                if (!o.scored && o.x + 65 < player.x) {
                    o.scored = true; score++;
                    document.getElementById('score').innerText = score;
                    createParticles(player.x + 18, player.y - 8, 14, '#22c55e', 6);
                    shake = 4;
                }
                
                // REFINED COLLISION (smaller hitbox)
                const px = player.x, py = player.y;
                const hitW = 18, hitH = 26; // tighter hitbox
                if (px + hitW > o.x && px - hitW < o.x + 62) {
                    if (py - hitH < o.top || py + hitH > o.bottom) {
                        shake = 14; createParticles(px, py, 28, '#ef4444', 7);
                        endGame(); return;
                    }
                }
                if (o.x < -90) obstacles.splice(i, 1);
            }
            
            // Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.vy += 0.22; p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function draw() {
            ctx.save();
            if (shake > 0) ctx.translate((Math.random()-0.5)*shake*1.1, (Math.random()-0.5)*shake*1.1);
            
            // Sleek office bg
            const g = ctx.createLinearGradient(0,0,0,HEIGHT);
            g.addColorStop(0,'#020617'); g.addColorStop(0.4,'#0f172a'); g.addColorStop(1,'#1e2937');
            ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
            
            // Floor
            ctx.fillStyle = '#334155'; ctx.fillRect(0, HEIGHT-34, WIDTH, 34);
            ctx.fillStyle = '#475569'; ctx.fillRect(0, HEIGHT-38, WIDTH, 4);
            
            // Ceiling grid
            ctx.strokeStyle = 'rgba(148,163,184,0.12)'; ctx.lineWidth = 1;
            for (let x=40; x<WIDTH; x+=55) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,HEIGHT); ctx.stroke(); }
            
            // Draw obstacles
            obstacles.forEach(o => {
                if (o.type === 'meeting') {
                    // Red meeting bar with corporate polish
                    ctx.fillStyle = '#b91c1c'; ctx.fillRect(o.x, 0, 62, o.top);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(o.x+3, 3, 56, o.top-6);
                    ctx.fillStyle = '#fff'; ctx.font = '700 11px Segoe UI'; ctx.fillText('MEETING', o.x+7, o.top-14);
                    ctx.fillStyle = '#450a0a'; ctx.fillRect(o.x-2, o.top-20, 66, 20);
                    
                    ctx.fillStyle = '#b91c1c'; ctx.fillRect(o.x, o.bottom, 62, HEIGHT-o.bottom);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(o.x+3, o.bottom+3, 56, HEIGHT-o.bottom-6);
                    ctx.fillStyle = '#450a0a'; ctx.fillRect(o.x-2, o.bottom, 66, 20);
                } else {
                    // Flying urgent email
                    ctx.fillStyle = '#1e40af'; ctx.fillRect(o.x+6, o.top-8, 50, 34);
                    ctx.fillStyle = '#3b82f6'; ctx.fillRect(o.x+8, o.top-6, 46, 30);
                    ctx.fillStyle = '#1e3a8a';
                    ctx.beginPath(); ctx.moveTo(o.x+8, o.top-6); ctx.lineTo(o.x+31, o.top+9); ctx.lineTo(o.x+54, o.top-6); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '700 10px Segoe UI'; ctx.fillText('URGENT', o.x+13, o.top+11);
                    // Stamp
                    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.strokeRect(o.x+38, o.top-2, 14, 14);
                }
            });
            
            // Refined Corporate Employee sprite
            ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.rot);
            
            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.ellipse(3, 22, 16, 5, 0, 0, Math.PI*2); ctx.fill();
            
            // Suit body
            ctx.fillStyle = '#1e3a8a'; ctx.fillRect(-13, -16, 26, 34);
            ctx.fillStyle = '#172554'; ctx.fillRect(-10, -13, 20, 28);
            
            // Tie (animated flap)
            ctx.fillStyle = '#ef4444';
            ctx.beginPath(); ctx.moveTo(0, -12); ctx.lineTo(-5, 9); ctx.lineTo(0, 14); ctx.lineTo(5, 9); ctx.fill();
            
            // Head
            ctx.fillStyle = '#fed7aa'; ctx.beginPath(); ctx.arc(0, -22, 11, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#334155'; ctx.beginPath(); ctx.ellipse(0, -27, 10, 5, 0, 0, Math.PI*2); ctx.fill(); // hair
            
            // Eye + brow
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(4, -24, 3.5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.arc(5, -24, 1.8, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = '#334155'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(-2, -29); ctx.lineTo(8, -29); ctx.stroke();
            
            // Briefcase (swinging)
            const bx = 15 + Math.sin(frame*0.12)*2;
            ctx.fillStyle = '#78350f'; ctx.fillRect(bx-2, -4, 16, 13);
            ctx.fillStyle = '#451a03'; ctx.fillRect(bx, 0, 12, 5);
            
            // Arm
            ctx.strokeStyle = '#fed7aa'; ctx.lineWidth = 4; ctx.lineCap = 'round';
            ctx.beginPath(); ctx.moveTo(8, -8); ctx.lineTo(bx+4, 2); ctx.stroke();
            
            ctx.restore();
            
            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = Math.max(0, p.life/38);
                ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        
        function gameLoop() { update(); draw(); if (gameRunning) requestAnimationFrame(gameLoop); }
        
        function flap() {
            if (!gameRunning) { startGame(); return; }
            player.vy = FLAP; shake = 6;
            createParticles(player.x-8, player.y+4, 10, '#60a5fa', 5);
            if (!firstFlap) { firstFlap = true; }
        }
        
        function startGame() {
            resizeCanvas();
            player.x = WIDTH * 0.26; player.y = HEIGHT * 0.47; player.vy = 0; player.rot = 0;
            obstacles = []; particles = []; score = 0; frame = 0; shake = 0; firstFlap = false;
            
            document.getElementById('score').innerText = '0';
            document.getElementById('score').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            
            createObstacle(); createObstacle(); obstacles[1].x = WIDTH * 1.55;
            
            gameRunning = true; gameLoop();
        }
        
        function endGame() {
            gameRunning = false;
            if (score > highScore) { highScore = score; localStorage.setItem('deadlineDodgerHighScore', highScore); }
            document.getElementById('final-score').innerText = score;
            document.getElementById('high-score').innerText = highScore;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('score').classList.add('hidden');
        }
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        canvas.addEventListener('touchstart', e => {e.preventDefault(); flap();});
        canvas.addEventListener('mousedown', flap);
        document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
        window.addEventListener('resize', () => { if (!gameRunning) resizeCanvas(); });
        
        function init() { resizeCanvas(); player.x = WIDTH*0.26; player.y = HEIGHT*0.47; draw(); document.getElementById('start-screen').classList.remove('hidden'); }
        init();
    </script>
</body>
</html>
