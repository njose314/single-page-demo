<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deadline Dodger 💼</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: manipulation;
        }
        #game-container {
            position: relative;
            width: 100vw;
            max-width: 100vw;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #score {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 42px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            z-index: 20;
            letter-spacing: 2px;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            background: rgba(15, 23, 42, 0.85);
        }
        .overlay h1 {
            font-size: 52px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 12px;
            text-align: center;
            letter-spacing: -1px;
        }
        .overlay p {
            font-size: 22px;
            color: #94a3b8;
            margin-bottom: 30px;
            text-align: center;
        }
        button {
            padding: 18px 48px;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        .hidden { display: none !important; }
        .corporate-bg { background: linear-gradient(180deg, #0f172a 0%, #1e2937 100%); }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        
        <div id="score" class="hidden">0</div>
        
        <!-- Start Screen -->
        <div id="start-screen" class="overlay">
            <div style="text-align: center;">
                <div style="font-size: 72px; margin-bottom: 8px;">💼</div>
                <h1 style="font-size: 56px; color: #fff; margin-bottom: 8px;">DEADLINE<br>DODGER</h1>
                <p style="font-size: 20px; max-width: 280px;">Dodge meetings.<br>Survive the day.<br>Get promoted.</p>
                <button id="start-btn" style="margin-top: 20px; font-size: 22px; padding: 20px 60px;">START SHIFT</button>
                <p style="margin-top: 30px; font-size: 15px; color: #64748b;">Tap anywhere or SPACE to flap</p>
            </div>
        </div>
        
        <!-- Game Over -->
        <div id="game-over" class="overlay hidden">
            <div style="text-align: center;">
                <div style="font-size: 64px; margin-bottom: 10px;">😵</div>
                <h1 style="font-size: 48px; color: #ef4444; margin-bottom: 8px;">YOU'RE FIRED!</h1>
                <p style="font-size: 26px; color: #fff; margin: 12px 0;">Promotions: <span id="final-score" style="font-weight: 800; color: #22c55e;">0</span></p>
                <p id="high-score-text" style="font-size: 18px; color: #94a3b8; margin-bottom: 25px;">Personal Best: <span id="high-score">0</span></p>
                <button id="restart-btn" style="background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 10px 25px rgba(34, 197, 94, 0.5);">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        let WIDTH = 0, HEIGHT = 0;
        let player = { x: 0, y: 0, vy: 0, size: 32 };
        let obstacles = [];
        let particles = [];
        let score = 0;
        let gameRunning = false;
        let frame = 0;
        let shake = 0;
        let highScore = parseInt(localStorage.getItem('deadlineDodgerHighScore') || '0');
        
        const GRAVITY = 0.72;
        const FLAP = -13.5;
        const SPEED = 3.2;
        
        function resizeCanvas() {
            WIDTH = Math.min(window.innerWidth, 480);
            HEIGHT = Math.min(window.innerHeight, 854); // 9:16 ratio
            
            // Maintain 9:16 aspect ratio
            const aspect = 9 / 16;
            if (WIDTH / HEIGHT > aspect) {
                WIDTH = HEIGHT * aspect;
            } else {
                HEIGHT = WIDTH / aspect;
            }
            
            canvas.width = WIDTH;
            canvas.height = HEIGHT;
            canvas.style.width = WIDTH + 'px';
            canvas.style.height = HEIGHT + 'px';
            
            if (!gameRunning) {
                player.x = WIDTH * 0.28;
                player.y = HEIGHT * 0.48;
            }
        }
        
        function createObstacle() {
            const gap = 155;
            const minY = 90;
            const maxY = HEIGHT - gap - 90;
            const gapY = minY + Math.random() * (maxY - minY);
            
            // Corporate obstacle: Meeting + Email
            obstacles.push({
                x: WIDTH + 20,
                top: gapY,
                bottom: gapY + gap,
                type: Math.random() > 0.5 ? 'meeting' : 'email',
                scored: false
            });
        }
        
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 2,
                    life: 28 + Math.random() * 18,
                    color,
                    size: 3 + Math.random() * 4
                });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            
            frame++;
            shake = Math.max(0, shake - 1);
            
            // Physics - mouth-watering feel
            player.vy += GRAVITY;
            player.y += player.vy;
            
            // Ceiling bounce (juicy)
            if (player.y < player.size + 10) {
                player.y = player.size + 10;
                player.vy = 1.5;
                shake = 4;
                createParticles(player.x, player.y - 15, 8, '#60a5fa');
            }
            
            // Ground collision
            if (player.y + player.size > HEIGHT - 35) {
                player.y = HEIGHT - 35 - player.size;
                endGame();
                return;
            }
            
            // Spawn obstacles
            if (frame % 78 === 0) {
                createObstacle();
            }
            
            // Update obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.x -= SPEED;
                
                // Score
                if (!obs.scored && obs.x + 70 < player.x) {
                    obs.scored = true;
                    score++;
                    document.getElementById('score').innerText = score;
                    createParticles(player.x + 20, player.y - 10, 12, '#22c55e');
                    shake = 3;
                }
                
                // Collision
                if (player.x + player.size > obs.x && player.x - player.size < obs.x + 70) {
                    if (player.y - player.size < obs.top || player.y + player.size > obs.bottom) {
                        shake = 12;
                        createParticles(player.x, player.y, 25, '#ef4444');
                        endGame();
                        return;
                    }
                }
                
                if (obs.x < -80) obstacles.splice(i, 1);
            }
            
            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.18;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function draw() {
            ctx.save();
            if (shake > 0) {
                ctx.translate(
                    (Math.random() - 0.5) * shake * 1.2,
                    (Math.random() - 0.5) * shake * 1.2
                );
            }
            
            // Office background
            const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
            grad.addColorStop(0, '#0f172a');
            grad.addColorStop(0.35, '#1e2937');
            grad.addColorStop(1, '#334155');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Office floor
            ctx.fillStyle = '#475569';
            ctx.fillRect(0, HEIGHT - 38, WIDTH, 38);
            ctx.fillStyle = '#64748b';
            ctx.fillRect(0, HEIGHT - 42, WIDTH, 4);
            
            // Ceiling lights
            ctx.fillStyle = 'rgba(148, 163, 184, 0.15)';
            for (let i = 60; i < WIDTH; i += 110) {
                ctx.fillRect(i, 12, 70, 8);
            }
            
            // Draw obstacles
            obstacles.forEach(obs => {
                if (obs.type === 'meeting') {
                    // Meeting bar (corporate red)
                    ctx.fillStyle = '#ef4444';
                    ctx.fillRect(obs.x, 0, 68, obs.top);
                    ctx.fillRect(obs.x, obs.bottom, 68, HEIGHT - obs.bottom);
                    
                    // Meeting label
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 13px Segoe UI';
                    ctx.fillText('MEETING', obs.x + 6, obs.top - 18);
                    
                    // Top cap
                    ctx.fillStyle = '#b91c1c';
                    ctx.fillRect(obs.x - 3, obs.top - 22, 74, 22);
                } else {
                    // Email envelope (flying)
                    ctx.fillStyle = '#3b82f6';
                    ctx.fillRect(obs.x + 8, obs.top - 12, 52, 38);
                    ctx.fillStyle = '#1e40af';
                    ctx.beginPath();
                    ctx.moveTo(obs.x + 8, obs.top - 12);
                    ctx.lineTo(obs.x + 34, obs.top + 7);
                    ctx.lineTo(obs.x + 60, obs.top - 12);
                    ctx.fill();
                    
                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 11px Segoe UI';
                    ctx.fillText('URGENT', obs.x + 14, obs.top + 14);
                }
            });
            
            // Draw player (Corporate Employee)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Body (suit)
            ctx.fillStyle = '#1e3a8a';
            ctx.fillRect(-14, -18, 28, 36);
            
            // Tie
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.moveTo(0, -14);
            ctx.lineTo(-6, 8);
            ctx.lineTo(0, 12);
            ctx.lineTo(6, 8);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#fed7aa';
            ctx.beginPath();
            ctx.arc(0, -24, 13, 0, Math.PI * 2);
            ctx.fill();
            
            // Hair
            ctx.fillStyle = '#334155';
            ctx.beginPath();
            ctx.ellipse(0, -30, 12, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Briefcase
            ctx.fillStyle = '#78350f';
            ctx.fillRect(16, -6, 18, 14);
            ctx.fillStyle = '#451a03';
            ctx.fillRect(18, -2, 14, 6);
            
            // Eye
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(5, -26, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.arc(6, -26, 2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
            
            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = Math.max(0, p.life / 40);
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
            
            ctx.restore();
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(gameLoop);
        }
        
        function flap() {
            if (!gameRunning) {
                startGame();
                return;
            }
            player.vy = FLAP;
            shake = 5;
            createParticles(player.x - 10, player.y + 5, 9, '#60a5fa');
        }
        
        function startGame() {
            resizeCanvas();
            player.x = WIDTH * 0.28;
            player.y = HEIGHT * 0.48;
            player.vy = 0;
            obstacles = [];
            particles = [];
            score = 0;
            frame = 0;
            shake = 0;
            
            document.getElementById('score').innerText = '0';
            document.getElementById('score').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            
            createObstacle();
            createObstacle();
            obstacles[1].x = WIDTH * 1.6;
            
            gameRunning = true;
            gameLoop();
        }
        
        function endGame() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('deadlineDodgerHighScore', highScore);
            }
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('high-score').innerText = highScore;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('score').classList.add('hidden');
        }
        
        // Events
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        
        canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); });
        canvas.addEventListener('mousedown', flap);
        
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); flap(); }
        });
        
        window.addEventListener('resize', () => {
            if (!gameRunning) resizeCanvas();
        });
        
        // Boot
        function init() {
            resizeCanvas();
            player.x = WIDTH * 0.28;
            player.y = HEIGHT * 0.48;
            draw();
            document.getElementById('start-screen').classList.remove('hidden');
        }
        init();
    </script>
</body>
</html>
