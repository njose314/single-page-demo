<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CORPORATE DESCENT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; overflow: hidden; touch-action: manipulation; }
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { display: block; image-rendering: crisp-edges; image-rendering: pixelated; }
        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; font-family: 'Courier New', monospace; }
        .hud-text { position: absolute; color: #0ff; text-shadow: 0 0 8px #0ff; font-weight: 900; pointer-events: none; }
        #floor { top: 12px; left: 16px; font-size: 18px; }
        #score { top: 12px; left: 50%; transform: translateX(-50%); font-size: 22px; }
        #hp { top: 12px; right: 16px; font-size: 18px; }
        #ammo { bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
        .ammo-pip { width: 14px; height: 6px; background: #ff0; border: 1px solid #fff; box-shadow: 0 0 6px #ff0; }
        .ammo-pip.empty { background: #333; box-shadow: none; border-color: #555; }
        #notification { position: absolute; top: 28%; left: 50%; transform: translate(-50%, -50%); color: #f0f; font-size: 15px; text-shadow: 0 0 10px #f0f; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.88); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        .overlay h1 { font-size: 52px; color: #0ff; text-shadow: 0 0 20px #0ff; margin-bottom: 8px; letter-spacing: 2px; }
        .overlay p { color: #f0f; font-size: 18px; margin-bottom: 32px; }
        button { padding: 18px 60px; font-size: 20px; font-weight: 800; background: #f0f; color: #000; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 0 25px #f0f; transition: all 0.1s; text-transform: uppercase; letter-spacing: 1.5px; }
        button:active { transform: scale(0.92); box-shadow: 0 0 12px #f0f; }
        .hidden { display: none !important; }
        #scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; background: repeating-linear-gradient(transparent, transparent 3px, rgba(255,255,255,0.06) 3px, rgba(255,255,255,0.06) 4px); z-index: 15; }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 120px rgba(0,0,0,0.85); z-index: 16; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="hud">
            <div id="floor" class="hud-text">FLOOR B1</div>
            <div id="score" class="hud-text">000000</div>
            <div id="hp" class="hud-text">♥♥♥</div>
            <div id="ammo"></div>
        </div>
        <div id="notification"></div>
        <div id="scanlines"></div>
        <div id="vignette"></div>
        
        <div id="menu" class="overlay">
            <h1>CORPORATE<br>DESCENT</h1>
            <p>QUARTERLY PERFORMANCE REVIEW</p>
            <button id="start-btn">CLOCK IN</button>
        </div>
        
        <div id="death" class="overlay hidden">
            <h1 style="color:#f00; text-shadow:0 0 20px #f00;">YOU'RE FIRED</h1>
            <p id="death-message" style="color:#fff; font-size:16px; max-width:280px; text-align:center; margin:12px 0 20px;"></p>
            <div style="font-size:22px; color:#0ff; margin-bottom:8px;">FINAL SCORE: <span id="final-score">000000</span></div>
            <div style="font-size:16px; color:#666; margin-bottom:32px;">PERSONAL BEST: <span id="best-score">000000</span></div>
            <button id="restart-btn">TRY AGAIN</button>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        const CONFIG = {
            LOGICAL_WIDTH: 360,
            TILE_SIZE: 40,
            GRAVITY: 0.40,
            MAX_FALL_SPEED: 13,
            JUMP_FORCE: -8.4,
            PLAYER_SPEED: 3.6,
            COYOTE_TIME: 8,
            INPUT_BUFFER: 10,
            CAMERA_LERP: 0.12,
            PLAYER_HP: 3,
            MAX_AMMO: 8,
            SHOOT_COOLDOWN: 9,
            DIFFICULTY_SCALE: 0.0008,
            PLATFORM_MIN_GAP: 48,
            PLATFORM_MAX_GAP: 92,
            ENEMY_SPAWN_CHANCE: 0.32,
            NOTIFICATION_INTERVAL: 420
        };

        let canvas, ctx;
        let WIDTH, HEIGHT, SCALE;
        let player = { x: 0, y: 0, vx: 0, vy: 0, hp: 3, ammo: 8, facing: 1, onGround: false, coyote: 0, buffer: 0, shootCooldown: 0, invuln: 0, walkFrame: 0, rot: 0 };
        let platforms = [];
        let enemies = [];
        let particles = [];
        let scorePops = [];
        let notifications = [];
        let score = 0;
        let floor = 1;
        let depth = 0;
        let gameRunning = false;
        let lastTime = 0;
        let keys = {};
        let touchZones = { left: false, right: false, fire: false };
        let combo = 0;
        let comboTimer = 0;
        let bestScore = parseInt(localStorage.getItem('corporateDescentBest') || '0');
        let frame = 0;
        let shake = 0;

        function setupInput() {
            document.addEventListener('keydown', e => {
                keys[e.key.toLowerCase()] = true;
                if ([' ', 'w', 'arrowup'].includes(e.key.toLowerCase()) && gameRunning) {
                    e.preventDefault();
                    player.buffer = CONFIG.INPUT_BUFFER;
                }
                if (['x', 'z', 'shift'].includes(e.key.toLowerCase()) && gameRunning) {
                    shoot();
                }
            });
            document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

            const container = document.getElementById('game-container');
            container.addEventListener('touchstart', handleTouch, { passive: false });
            container.addEventListener('touchmove', handleTouch, { passive: false });
            container.addEventListener('touchend', () => { touchZones.left = touchZones.right = touchZones.fire = false; }, { passive: false });

            function handleTouch(e) {
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const x = (e.touches[0].clientX - rect.left) / SCALE;
                const zone = Math.floor(x / (WIDTH / 3));
                touchZones.left = zone === 0;
                touchZones.right = zone === 1;
                touchZones.fire = zone === 2;
                if (touchZones.fire && gameRunning) shoot();
                if ((touchZones.left || touchZones.right) && gameRunning) player.buffer = CONFIG.INPUT_BUFFER;
            }
        }

        function generateWorld() {
            platforms = [];
            enemies = [];
            particles = [];
            scorePops = [];
            notifications = [];
            depth = 0;
            floor = 1;
            score = 0;
            combo = 0;

            platforms.push({ x: 80, y: 220, w: 200, h: 12, type: 'floor' });

            let y = 180;
            for (let i = 0; i < 18; i++) {
                const w = 80 + Math.random() * 120;
                const x = 20 + Math.random() * (CONFIG.LOGICAL_WIDTH - w - 40);
                platforms.push({ x, y, w, h: 11, type: 'floor' });
                y -= 55 + Math.random() * 35;
            }
        }

        function spawnPlatformRow() {
            const lastY = platforms.length ? platforms[platforms.length - 1].y : 100;
            const gap = CONFIG.PLATFORM_MIN_GAP + Math.random() * (CONFIG.PLATFORM_MAX_GAP - CONFIG.PLATFORM_MIN_GAP);
            const w = 70 + Math.random() * 130;
            const x = 25 + Math.random() * (CONFIG.LOGICAL_WIDTH - w - 50);
            platforms.push({ x, y: lastY - gap, w, h: 11, type: 'floor' });

            if (Math.random() < 0.35) {
                platforms[platforms.length - 1].decor = Math.random() < 0.5 ? 'desk' : 'plant';
            }

            if (Math.random() < CONFIG.ENEMY_SPAWN_CHANCE + depth * 0.0006) {
                spawnEnemy(x + Math.random() * (w - 20), lastY - gap - 28);
            }
        }

        function spawnEnemy(x, y) {
            const type = Math.random() < 0.5 ? 'manager' : (Math.random() < 0.6 ? 'drone' : 'board');
            const hp = type === 'manager' ? 1 : (type === 'drone' ? 2 : 3);
            enemies.push({ x, y, vx: (Math.random() - 0.5) * 1.2, vy: 0, type, hp, maxHp: hp, flash: 0, patrolDir: Math.random() < 0.5 ? 1 : -1 });
        }

        function updatePlayer() {
            if (!gameRunning) return;

            let move = 0;
            if (keys['a'] || keys['arrowleft'] || touchZones.left) move = -1;
            if (keys['d'] || keys['arrowright'] || touchZones.right) move = 1;
            player.vx = move * CONFIG.PLAYER_SPEED;

            player.vy = Math.min(player.vy + CONFIG.GRAVITY, CONFIG.MAX_FALL_SPEED);
            player.y += player.vy;
            player.x += player.vx;

            if (player.x < 12) player.x = 12;
            if (player.x > CONFIG.LOGICAL_WIDTH - 12) player.x = CONFIG.LOGICAL_WIDTH - 12;

            player.onGround = false;
            for (let p of platforms) {
                if (player.vy >= 0 && player.x + 8 > p.x && player.x - 8 < p.x + p.w && player.y + 13 > p.y && player.y + 13 < p.y + 14) {
                    player.y = p.y - 13;
                    player.vy = 0;
                    player.onGround = true;
                    player.coyote = CONFIG.COYOTE_TIME;

                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const e = enemies[i];
                        if (Math.abs(player.x - e.x) < 22 && Math.abs(player.y - e.y) < 18) {
                            killEnemy(i, true);
                        }
                    }

                    if (player.ammo < CONFIG.MAX_AMMO) {
                        player.ammo = CONFIG.MAX_AMMO;
                        createParticles(player.x, player.y + 10, 6, '#ff0');
                    }

                    if (combo > 0) {
                        score += combo * 25;
                        showScorePop(player.x, player.y - 25, `+${combo * 25} COMBO!`);
                        combo = 0;
                    }
                    break;
                }
            }

            if (!player.onGround) player.coyote = Math.max(0, player.coyote - 1);

            if ((player.buffer > 0 || keys[' '] || keys['w'] || keys['arrowup']) && (player.onGround || player.coyote > 0)) {
                player.vy = CONFIG.JUMP_FORCE;
                player.onGround = false;
                player.coyote = 0;
                player.buffer = 0;
                createParticles(player.x, player.y + 12, 5, '#0ff');
            }
            if (player.buffer > 0) player.buffer--;

            if (player.shootCooldown > 0) player.shootCooldown--;

            if (player.invuln > 0) player.invuln--;

            if (player.onGround && Math.abs(player.vx) > 0.5) player.walkFrame = (player.walkFrame + 0.25) % 4;
            else player.walkFrame = 0;

            if ((keys['x'] || keys['z'] || keys['shift'] || touchZones.fire) && player.shootCooldown === 0 && player.ammo > 0) {
                shoot();
            }
        }

        function shoot() {
            if (player.ammo <= 0 || player.shootCooldown > 0) return;
            player.ammo--;
            player.shootCooldown = CONFIG.SHOOT_COOLDOWN;

            const dir = player.facing;
            const bullet = { x: player.x + (dir * 14), y: player.y - 4, vx: dir * 7.5, vy: 0, life: 28 };
            particles.push(bullet);

            createParticles(player.x + (dir * 10), player.y - 3, 4, '#ff0', 2);
            shake = 2;
        }

        function killEnemy(index, stomped = false) {
            const e = enemies[index];
            createParticles(e.x, e.y, 14, '#f00');
            score += (e.type === 'manager' ? 40 : e.type === 'drone' ? 70 : 120) * (combo + 1);
            combo++;
            comboTimer = 90;

            if (stomped) {
                player.vy = -6.5;
                createParticles(e.x, e.y + 5, 8, '#0f0');
            }

            showScorePop(e.x, e.y - 18, `+${(e.type === 'manager' ? 40 : e.type === 'drone' ? 70 : 120) * (combo + 1)}`);
            enemies.splice(index, 1);
        }

        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.flash = Math.max(0, e.flash - 1);

                if (e.type === 'manager') {
                    e.vx = e.patrolDir * 0.9;
                    e.x += e.vx;
                    if (e.x < 20 || e.x > CONFIG.LOGICAL_WIDTH - 20) e.patrolDir *= -1;
                } else if (e.type === 'drone') {
                    e.vy = Math.sin(frame * 0.08) * 1.1;
                    e.x += Math.sin(frame * 0.05) * 0.6;
                    e.y += e.vy;
                } else if (e.type === 'board') {
                    e.vx = e.patrolDir * 1.35;
                    e.x += e.vx;
                    if (e.x < 15 || e.x > CONFIG.LOGICAL_WIDTH - 15) e.patrolDir *= -1;
                }

                for (let j = particles.length - 1; j >= 0; j--) {
                    const p = particles[j];
                    if (p.life && Math.abs(p.x - e.x) < 12 && Math.abs(p.y - e.y) < 14) {
                        e.hp--;
                        e.flash = 6;
                        particles.splice(j, 1);
                        if (e.hp <= 0) {
                            killEnemy(i);
                            break;
                        }
                    }
                }

                if (player.invuln <= 0 && Math.abs(player.x - e.x) < 16 && Math.abs(player.y - e.y) < 16) {
                    player.hp--;
                    player.invuln = 45;
                    shake = 6;
                    createParticles(player.x, player.y, 12, '#f00');
                    if (player.hp <= 0) {
                        gameOver();
                        return;
                    }
                }

                if (e.y > player.y + 400) enemies.splice(i, 1);
            }
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.rot);
            const s = 1.35;
            const inv = player.invuln > 0 && Math.floor(frame / 3) % 2 === 0;

            if (inv) ctx.globalAlpha = 0.4;

            const legOffset = Math.sin(player.walkFrame) * 2.5;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(-5, 3, 4, 11);
            ctx.fillRect(1, 3, 4, 11);
            if (player.onGround && Math.abs(player.vx) > 0.5) {
                ctx.fillRect(-5, 3, 4, 11 + legOffset);
                ctx.fillRect(1, 3, 4, 11 - legOffset);
            }

            ctx.fillStyle = '#16213e';
            ctx.fillRect(-7, -9, 14, 13);
            ctx.fillStyle = '#e8e8e8';
            ctx.fillRect(-5, -7, 10, 9);
            ctx.fillStyle = '#c1121f';
            ctx.fillRect(-2, -6, 4, 8);
            ctx.fillStyle = '#fed7aa';
            ctx.fillRect(-4, -16, 8, 8);
            ctx.fillStyle = '#111';
            ctx.fillRect(-2, -14, 1.5, 1.5);
            ctx.fillRect(1, -14, 1.5, 1.5);
            ctx.fillStyle = '#3a2f1f';
            ctx.fillRect(-11, -3, 6, 8);
            ctx.fillStyle = '#1f170f';
            ctx.fillRect(-10, -1, 4, 4);

            const gunX = player.shootCooldown > 3 ? 9 : 7;
            ctx.fillStyle = '#444';
            ctx.fillRect(gunX, -4, 8, 4);
            ctx.fillStyle = '#222';
            ctx.fillRect(gunX + 6, -3, 3, 2);

            ctx.restore();
        }

        function drawEnemy(e) {
            ctx.save();
            ctx.translate(e.x, e.y);
            const flash = e.flash > 0 ? 0.6 : 1;
            ctx.globalAlpha = flash;

            if (e.type === 'manager') {
                ctx.fillStyle = '#9f1239';
                ctx.fillRect(-6, -8, 12, 14);
                ctx.fillStyle = '#fed7aa';
                ctx.fillRect(-4, -14, 8, 7);
                ctx.fillStyle = '#111';
                ctx.fillRect(-2, -12, 1, 1);
                ctx.fillRect(1, -12, 1, 1);
                ctx.fillStyle = '#ddd';
                ctx.fillRect(6, -3, 5, 6);
            } else if (e.type === 'drone') {
                ctx.fillStyle = '#581c87';
                ctx.fillRect(-5, -6, 10, 10);
                ctx.fillStyle = '#fed7aa';
                ctx.fillRect(-3, -11, 6, 6);
                ctx.fillStyle = '#111';
                ctx.fillRect(-1, -9, 1, 1);
                ctx.fillRect(1, -9, 1, 1);
                ctx.fillStyle = 'rgba(168,85,247,0.4)';
                ctx.fillRect(-7, 2, 14, 3);
            } else if (e.type === 'board') {
                ctx.fillStyle = '#1f2937';
                ctx.fillRect(-5, -10, 10, 16);
                ctx.fillStyle = '#e5e7eb';
                ctx.fillRect(-4, -15, 8, 6);
                ctx.fillStyle = '#111';
                ctx.fillRect(-2, -13, 1.5, 1.5);
                ctx.fillRect(1, -13, 1.5, 1.5);
                ctx.fillStyle = '#f00';
                ctx.fillRect(-2, -12, 1, 1);
                ctx.fillRect(2, -12, 1, 1);
            }

            if (e.hp < e.maxHp) {
                ctx.fillStyle = '#222';
                ctx.fillRect(-7, -18, 14, 3);
                ctx.fillStyle = '#0f0';
                ctx.fillRect(-7, -18, 14 * (e.hp / e.maxHp), 3);
            }

            ctx.restore();
        }

        function drawPlatform(p) {
            ctx.fillStyle = '#334155';
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.fillStyle = '#475569';
            ctx.fillRect(p.x, p.y, p.w, 3);
            ctx.fillStyle = '#1e2937';
            ctx.fillRect(p.x + 8, p.y + 3, p.w - 16, 4);

            if (p.decor === 'desk') {
                ctx.fillStyle = '#3a2f1f';
                ctx.fillRect(p.x + p.w / 2 - 12, p.y - 8, 24, 8);
            } else if (p.decor === 'plant') {
                ctx.fillStyle = '#166534';
                ctx.fillRect(p.x + p.w / 2 - 4, p.y - 10, 8, 10);
            }
        }

        function createParticles(x, y, count, color, spread = 4.5) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*spread, vy: (Math.random()-0.5)*spread - 1.6, life: 18 + Math.random()*12, color, size: 1.8 + Math.random()*2.8 });
            }
        }

        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (p.life !== undefined) {
                    ctx.globalAlpha = Math.max(0.1, p.life / 20);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.12;
                    p.life--;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }
            ctx.globalAlpha = 1;
        }

        function drawScorePops() {
            for (let i = scorePops.length - 1; i >= 0; i--) {
                const s = scorePops[i];
                ctx.fillStyle = s.color || '#0ff';
                ctx.font = '700 11px monospace';
                ctx.fillText(s.text, s.x, s.y);
                s.y -= 0.6;
                s.life--;
                if (s.life <= 0) scorePops.splice(i, 1);
            }
        }

        function drawHUD() {
            document.getElementById('floor').textContent = `FLOOR B${floor}`;
            document.getElementById('score').textContent = String(score).padStart(6, '0');
            let hpHTML = '';
            for (let i = 0; i < 3; i++) hpHTML += i < player.hp ? '♥' : '♡';
            document.getElementById('hp').innerHTML = hpHTML;

            const ammoDiv = document.getElementById('ammo');
            ammoDiv.innerHTML = '';
            for (let i = 0; i < CONFIG.MAX_AMMO; i++) {
                const pip = document.createElement('div');
                pip.className = `ammo-pip ${i < player.ammo ? '' : 'empty'}`;
                ammoDiv.appendChild(pip);
            }
        }

        function showNotification(text) {
            const n = document.getElementById('notification');
            n.textContent = text;
            n.style.opacity = '1';
            setTimeout(() => n.style.opacity = '0', 1400);
        }

        function showScorePop(x, y, text, color = '#0ff') {
            scorePops.push({ x, y, text, color, life: 38 });
        }

        function update() {
            if (!gameRunning) return;

            updatePlayer();
            updateEnemies();

            depth += 0.8;
            for (let p of platforms) p.y += 0.8;
            for (let e of enemies) e.y += 0.8;
            for (let p of particles) if (p.life) p.y += 0.8;
            for (let s of scorePops) s.y += 0.8;

            platforms = platforms.filter(p => p.y < player.y + 380);
            enemies = enemies.filter(e => e.y < player.y + 380);

            while (platforms.length < 22) spawnPlatformRow();

            if (depth > floor * 95) {
                floor++;
                if (floor % 3 === 0) showNotification("SYNERGY ACHIEVED");
                else if (floor % 4 === 0) showNotification("KPI EXCEEDED");
                else if (floor % 5 === 0) showNotification("PIVOTING CORE VALUES");
            }

            if (frame % CONFIG.NOTIFICATION_INTERVAL === 0 && Math.random() < 0.6) {
                const msgs = ["CIRCLING BACK", "BANDWIDTH OPTIMIZED", "MOVE THE NEEDLE", "BLUE SKY THINKING", "LOW-HANGING FRUIT CLAIMED", "PARADIGM SHIFTED", "VALUE-ADD DETECTED"];
                showNotification(msgs[Math.floor(Math.random() * msgs.length)]);
            }

            if (comboTimer > 0) comboTimer--;
            else combo = 0;

            if (player.y > HEIGHT + 40) {
                gameOver();
            }
        }

        function draw() {
            ctx.save();
            if (shake > 0) ctx.translate((Math.random()-0.5)*shake*0.9, (Math.random()-0.5)*shake*0.9);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            ctx.strokeStyle = 'rgba(0,255,255,0.04)';
            ctx.lineWidth = 1;
            for (let x = 0; x < WIDTH; x += 36) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, HEIGHT);
                ctx.stroke();
            }

            for (let p of platforms) {
                if (p.y > -20 && p.y < HEIGHT + 20) drawPlatform(p);
            }

            for (let e of enemies) {
                if (e.y > -30 && e.y < HEIGHT + 30) drawEnemy(e);
            }

            drawPlayer();
            drawParticles();
            drawScorePops();

            ctx.restore();
        }

        function gameLoop(timestamp = 0) {
            if (!lastTime) lastTime = timestamp;
            let dt = timestamp - lastTime;
            if (dt > 50) dt = 50;
            lastTime = timestamp;

            if (gameRunning) {
                update();
                draw();
                drawHUD();
                frame++;
            }

            requestAnimationFrame(gameLoop);
        }

        function resize() {
            const container = document.getElementById('game-container');
            const rect = container.getBoundingClientRect();
            SCALE = Math.min(rect.width / CONFIG.LOGICAL_WIDTH, rect.height / 640);
            WIDTH = CONFIG.LOGICAL_WIDTH * SCALE;
            HEIGHT = 640 * SCALE;

            canvas.width = CONFIG.LOGICAL_WIDTH;
            canvas.height = 640;
            canvas.style.width = WIDTH + 'px';
            canvas.style.height = HEIGHT + 'px';
        }

        function gameOver() {
            gameRunning = false;
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('corporateDescentBest', bestScore);
            }
            document.getElementById('final-score').textContent = String(score).padStart(6, '0');
            document.getElementById('best-score').textContent = String(bestScore).padStart(6, '0');
            const msgs = ["PERFORMANCE REVIEW FAILED", "QUARTERLY TARGETS MISSED", "SYNERGY NOT ACHIEVED", "KPI COLLAPSE", "PARADIGM FAILURE"];
            document.getElementById('death-message').textContent = msgs[Math.floor(Math.random() * msgs.length)];
            document.getElementById('death').classList.remove('hidden');
        }

        function startGame() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('death').classList.add('hidden');
            generateWorld();
            player.x = 140;
            player.y = 180;
            player.vx = 0;
            player.vy = 0;
            player.hp = 3;
            player.ammo = 8;
            player.invuln = 0;
            score = 0;
            floor = 1;
            depth = 0;
            combo = 0;
            gameRunning = true;
            frame = 0;
            shake = 0;
            lastTime = 0;
            document.getElementById('score').textContent = '000000';
            document.getElementById('floor').textContent = 'FLOOR B1';
        }

        function init() {
            canvas = document.getElementById('game');
            ctx = canvas.getContext('2d', { alpha: true });

            resize();
            window.addEventListener('resize', resize);

            setupInput();

            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('restart-btn').addEventListener('click', startGame);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0ff';
            ctx.font = '700 18px monospace';
            ctx.fillText("CORPORATE DESCENT", 60, 280);
            ctx.fillStyle = '#666';
            ctx.font = '14px monospace';
            ctx.fillText("Press START to begin quarterly review", 42, 310);

            document.getElementById('menu').classList.remove('hidden');
            requestAnimationFrame(gameLoop);
        }

        init();
    })();
    </script>
</body>
</html>
