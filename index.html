<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Deadline Dodger 💼</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #020617; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; touch-action: manipulation; }
        #game-container { position: relative; width: 100vw; max-width: 100vw; height: 100vh; max-height: 100vh; overflow: hidden; box-shadow: 0 0 80px rgba(0,0,0,0.8); }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        #score { position: absolute; top: 22px; left: 50%; transform: translateX(-50%); font-size: 44px; font-weight: 900; color: #fff; text-shadow: 0 4px 20px rgba(0,0,0,0.7); z-index: 20; letter-spacing: 3px; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30; background: rgba(2,6,23,0.88); }
        .overlay h1 { font-size: 58px; font-weight: 900; color: #fff; margin-bottom: 6px; text-align: center; letter-spacing: -2px; }
        .overlay p { font-size: 20px; color: #94a3b8; margin-bottom: 28px; text-align: center; max-width: 300px; }
        button { padding: 20px 56px; font-size: 21px; font-weight: 800; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: white; border: none; border-radius: 9999px; cursor: pointer; box-shadow: 0 12px 30px rgba(59,130,246,0.5); transition: all 0.15s cubic-bezier(0.4,0,0.2,1); text-transform: uppercase; letter-spacing: 1.5px; }
        button:active { transform: scale(0.92); box-shadow: 0 6px 18px rgba(59,130,246,0.4); }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game"></canvas>
        <div id="score" class="hidden">0</div>
        
        <div id="start-screen" class="overlay">
            <div style="text-align:center;">
                <div style="font-size:78px; margin-bottom:4px; filter: drop-shadow(0 10px 20px rgba(59,130,246,0.4));">💼</div>
                <h1 style="font-size:60px; color:#fff; margin-bottom:4px;">DEADLINE<br>DODGER</h1>
                <p>Dodge the meetings.<br>Survive the sprint.<br>Get that promotion.</p>
                <button id="start-btn" style="margin-top:18px; font-size:23px; padding:22px 68px;">START SHIFT</button>
                <p style="margin-top:32px; font-size:15px; color:#64748b;">Tap anywhere or press SPACE</p>
            </div>
        </div>
        
        <div id="game-over" class="overlay hidden">
            <div style="text-align:center;">
                <div style="font-size:68px; margin-bottom:8px;">😵‍💫</div>
                <h1 style="font-size:52px; color:#ef4444; margin-bottom:6px; text-shadow:0 4px 20px rgba(239,68,68,0.5);">YOU'RE FIRED!</h1>
                <p style="font-size:28px; color:#fff; margin:14px 0 6px;">Promotions: <span id="final-score" style="font-weight:900; color:#22c55e; font-size:34px;">0</span></p>
                <p style="font-size:17px; color:#64748b; margin-bottom:28px;">Personal Best: <span id="high-score" style="font-weight:700; color:#fff;">0</span></p>
                <button id="restart-btn" style="background:linear-gradient(135deg,#22c55e,#15803d); box-shadow:0 12px 30px rgba(34,197,94,0.5);">TRY AGAIN</button>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        let WIDTH = 0, HEIGHT = 0;
        let player = { x: 0, y: 0, vy: 0, size: 28, rot: 0 };
        let obstacles = [];
        let particles = [];
        let score = 0;
        let gameRunning = false;
        let frame = 0;
        let shake = 0;
        let firstFlap = false;
        let highScore = parseInt(localStorage.getItem('deadlineDodgerHighScore') || '0');
        let playerSprite = null;
        let spriteLoaded = false;
        
        let GRAVITY = 0.16;
        let SPEED = 0.95;
        const NORMAL_GRAVITY = 0.66;
        const NORMAL_SPEED = 3.0;
        const FLAP = -12.5;
        
        // Load original OpenGameArt Business Man sprite
        const spriteImg = new Image();
        spriteImg.crossOrigin = "Anonymous";
        spriteImg.src = "https://opengameart.org/sites/default/files/attckin1_0.png";
        spriteImg.onload = () => { spriteLoaded = true; console.log('OpenGameArt sprite loaded successfully'); };
        spriteImg.onerror = () => { console.log('Using fallback drawn sprite'); spriteLoaded = false; };
        
        function resizeCanvas() {
            const maxW = Math.min(window.innerWidth, 480);
            const maxH = Math.min(window.innerHeight, 854);
            const aspect = 9/16;
            if (maxW / maxH > aspect) { WIDTH = maxH * aspect; HEIGHT = maxH; }
            else { WIDTH = maxW; HEIGHT = maxW / aspect; }
            canvas.width = WIDTH; canvas.height = HEIGHT;
            canvas.style.width = WIDTH + 'px'; canvas.style.height = HEIGHT + 'px';
            if (!gameRunning) { player.x = WIDTH * 0.26; player.y = HEIGHT * 0.47; }
        }
        
        function createObstacle() {
            const gap = 145;
            const minY = 82; const maxY = HEIGHT - gap - 82;
            const gapY = minY + Math.random() * (maxY - minY);
            obstacles.push({ x: WIDTH + 22, top: gapY, bottom: gapY + gap, type: Math.random() > 0.5 ? 'meeting' : 'email', scored: false });
        }
        
        function createParticles(x, y, count, color, spread = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*spread, vy: (Math.random()-0.5)*spread - 1.8, life: 20 + Math.random()*14, color, size: 2 + Math.random()*3 });
            }
        }
        
        function update() {
            if (!gameRunning) return;
            frame++; shake = Math.max(0, shake - 0.7);
            
            if (!firstFlap) { GRAVITY = 0.15; SPEED = 0.9; }
            else { GRAVITY = NORMAL_GRAVITY; SPEED = NORMAL_SPEED; }
            
            player.vy += GRAVITY;
            player.y += player.vy;
            player.rot = Math.max(-0.55, Math.min(0.85, player.vy * 0.032));
            
            if (player.y < player.size + 7) { player.y = player.size + 7; player.vy = 2.0; shake = 4; createParticles(player.x, player.y-10, 6, '#60a5fa', 3.5); }
            if (player.y + player.size > HEIGHT - 30) { player.y = HEIGHT - 30 - player.size; endGame(); return; }
            
            if (frame % 74 === 0) createObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i]; o.x -= SPEED;
                if (!o.scored && o.x + 60 < player.x) { o.scored = true; score++; document.getElementById('score').innerText = score; createParticles(player.x+16, player.y-6, 12, '#22c55e', 5); shake = 3; }
                
                const hit = 16;
                if (player.x + hit > o.x && player.x - hit < o.x + 58) {
                    if (player.y - hit < o.top || player.y + hit > o.bottom) { shake = 12; createParticles(player.x, player.y, 24, '#ef4444', 6); endGame(); return; }
                }
                if (o.x < -85) obstacles.splice(i, 1);
            }
            
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--; if (p.life <= 0) particles.splice(i, 1);
            }
        }
        
        function draw() {
            ctx.save();
            if (shake > 0) ctx.translate((Math.random()-0.5)*shake*1.0, (Math.random()-0.5)*shake*1.0);
            
            const g = ctx.createLinearGradient(0,0,0,HEIGHT);
            g.addColorStop(0,'#020617'); g.addColorStop(0.38,'#0f172a'); g.addColorStop(1,'#1e2937');
            ctx.fillStyle = g; ctx.fillRect(0,0,WIDTH,HEIGHT);
            
            ctx.fillStyle = '#334155'; ctx.fillRect(0, HEIGHT-32, WIDTH, 32);
            ctx.fillStyle = '#475569'; ctx.fillRect(0, HEIGHT-36, WIDTH, 4);
            
            ctx.strokeStyle = 'rgba(148,163,184,0.1)'; ctx.lineWidth = 1;
            for (let x=38; x<WIDTH; x+=52) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,HEIGHT); ctx.stroke(); }
            
            obstacles.forEach(o => {
                if (o.type === 'meeting') {
                    ctx.fillStyle = '#b91c1c'; ctx.fillRect(o.x, 0, 58, o.top);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(o.x+2, 2, 54, o.top-4);
                    ctx.fillStyle = '#fff'; ctx.font = '700 10px Segoe UI'; ctx.fillText('MEETING', o.x+6, o.top-12);
                    ctx.fillStyle = '#450a0a'; ctx.fillRect(o.x-1, o.top-18, 60, 18);
                    
                    ctx.fillStyle = '#b91c1c'; ctx.fillRect(o.x, o.bottom, 58, HEIGHT-o.bottom);
                    ctx.fillStyle = '#ef4444'; ctx.fillRect(o.x+2, o.bottom+2, 54, HEIGHT-o.bottom-4);
                    ctx.fillStyle = '#450a0a'; ctx.fillRect(o.x-1, o.bottom, 60, 18);
                } else {
                    ctx.fillStyle = '#1e40af'; ctx.fillRect(o.x+5, o.top-6, 48, 30);
                    ctx.fillStyle = '#3b82f6'; ctx.fillRect(o.x+7, o.top-4, 44, 26);
                    ctx.fillStyle = '#1e3a8a';
                    ctx.beginPath(); ctx.moveTo(o.x+7, o.top-4); ctx.lineTo(o.x+29, o.top+9); ctx.lineTo(o.x+51, o.top-4); ctx.fill();
                    ctx.fillStyle = '#fff'; ctx.font = '700 9px Segoe UI'; ctx.fillText('URGENT', o.x+12, o.top+10);
                    ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1.5; ctx.strokeRect(o.x+36, o.top, 12, 12);
                }
            });
            
            // Use original OpenGameArt sprite if loaded, else fallback
            if (spriteLoaded && spriteImg.complete) {
                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.rot);
                // Draw the sprite (scaled to fit our player size)
                const sw = spriteImg.width * 0.6;
                const sh = spriteImg.height * 0.6;
                ctx.drawImage(spriteImg, -sw/2, -sh/2, sw, sh);
                ctx.restore();
            } else {
                // Fallback pixel-art style
                ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.rot);
                const s = 1.7;
                ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(-9*s, 16*s, 18*s, 4*s);
                ctx.fillStyle = '#1e3a8a'; ctx.fillRect(-7*s, 3*s, 5*s, 12*s); ctx.fillRect(2*s, 3*s, 5*s, 12*s);
                ctx.fillStyle = '#1e3a8a'; ctx.fillRect(-9*s, -11*s, 18*s, 16*s);
                ctx.fillStyle = '#172554'; ctx.fillRect(-6*s, -8*s, 12*s, 11*s);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(-2*s, -9*s, 4*s, 10*s);
                ctx.fillStyle = '#fed7aa'; ctx.fillRect(-5*s, -18*s, 10*s, 9*s);
                ctx.fillStyle = '#334155'; ctx.fillRect(-4*s, -17*s, 8*s, 3*s);
                ctx.fillStyle = '#fff'; ctx.fillRect(1*s, -15*s, 3*s, 2.5*s);
                ctx.fillStyle = '#0f172a'; ctx.fillRect(2*s, -14.5*s, 1.2*s, 1.2*s);
                ctx.fillStyle = '#78350f'; ctx.fillRect(10*s, -2*s, 9*s, 7*s);
                ctx.fillStyle = '#451a03'; ctx.fillRect(11*s, 0*s, 7*s, 3*s);
                ctx.fillStyle = '#fed7aa'; ctx.fillRect(7*s, -5*s, 3.5*s, 6*s);
                ctx.restore();
            }
            
            particles.forEach(p => {
                ctx.globalAlpha = Math.max(0, p.life/34);
                ctx.fillStyle = p.color; ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        
        function gameLoop() { update(); draw(); if (gameRunning) requestAnimationFrame(gameLoop); }
        
        function flap() {
            if (!gameRunning) { startGame(); return; }
            player.vy = FLAP; shake = 5;
            createParticles(player.x-6, player.y+3, 8, '#60a5fa', 4);
            if (!firstFlap) firstFlap = true;
        }
        
        function startGame() {
            resizeCanvas();
            player.x = WIDTH * 0.26; player.y = HEIGHT * 0.47; player.vy = 0; player.rot = 0;
            obstacles = []; particles = []; score = 0; frame = 0; shake = 0; firstFlap = false;
            document.getElementById('score').innerText = '0';
            document.getElementById('score').classList.remove('hidden');
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            createObstacle(); createObstacle(); obstacles[1].x = WIDTH * 1.5;
            gameRunning = true; gameLoop();
        }
        
        function endGame() {
            gameRunning = false;
            if (score > highScore) { highScore = score; localStorage.setItem('deadlineDodgerHighScore', highScore); }
            document.getElementById('final-score').innerText = score;
            document.getElementById('high-score').innerText = highScore;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('score').classList.add('hidden');
        }
        
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        canvas.addEventListener('touchstart', e => {e.preventDefault(); flap();});
        canvas.addEventListener('mousedown', flap);
        document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); flap(); } });
        window.addEventListener('resize', () => { if (!gameRunning) resizeCanvas(); });
        
        function init() { resizeCanvas(); player.x = WIDTH*0.26; player.y = HEIGHT*0.47; draw(); document.getElementById('start-screen').classList.remove('hidden'); }
        init();
    </script>
</body>
</html>
