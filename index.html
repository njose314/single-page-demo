<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Hopper 🐦</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #87CEEB;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #overlay h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
            text-align: center;
        }
        #overlay p {
            font-size: 24px;
            margin: 10px 0;
        }
        #start-screen, #game-over {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 36px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            z-index: 10;
        }
        button {
            margin-top: 20px;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: bold;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="400" height="600"></canvas>
        
        <!-- Score Display -->
        <div id="score" class="hidden">0</div>
        
        <!-- Start Screen -->
        <div id="start-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); border-radius: 12px;">
            <h1 style="font-size: 52px; margin-bottom: 10px; color: #FFD700;">SKY HOPPER</h1>
            <p style="font-size: 22px; margin: 10px 0; color: #fff;">Tap to Fly!</p>
            <button id="start-btn" style="margin-top: 30px; padding: 18px 50px; font-size: 22px; background: #FF5722; color: white; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,87,34,0.4);">START GAME</button>
            <p style="margin-top: 25px; font-size: 16px; color: #ddd;">Tap anywhere or press SPACE</p>
        </div>
        
        <!-- Game Over Screen -->
        <div id="game-over" class="hidden" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.75); border-radius: 12px;">
            <h1 style="font-size: 48px; color: #FF5252; margin-bottom: 10px;">GAME OVER</h1>
            <p style="font-size: 28px; margin: 15px 0; color: #fff;">Score: <span id="final-score">0</span></p>
            <button id="restart-btn" style="margin-top: 20px; padding: 18px 45px; font-size: 22px; background: #4CAF50; color: white; border: none; border-radius: 50px; cursor: pointer;">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let bird = { x: 100, y: 300, velocity: 0, size: 28 };
        let pipes = [];
        let score = 0;
        let gameRunning = false;
        let frame = 0;
        let highScore = localStorage.getItem('skyHopperHighScore') || 0;
        
        const GRAVITY = 0.6;
        const FLAP_STRENGTH = -10;
        const PIPE_SPEED = 3;
        const PIPE_GAP = 160;
        const PIPE_WIDTH = 60;
        
        function resetGame() {
            bird.y = 300;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frame = 0;
            document.getElementById('score').innerText = '0';
            document.getElementById('score').classList.add('hidden');
        }
        
        function createPipe() {
            const gapY = Math.random() * (canvas.height - PIPE_GAP - 120) + 60;
            pipes.push({
                x: canvas.width,
                topHeight: gapY,
                bottomY: gapY + PIPE_GAP,
                scored: false
            });
        }
        
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(0.6, '#E0F6FF');
            gradient.addColorStop(1, '#B2EBF2');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Clouds
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.beginPath();
            ctx.ellipse(80, 120, 50, 25, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(140, 100, 35, 20, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.ellipse(320, 180, 45, 22, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(370, 160, 30, 18, 0, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function drawBird() {
            ctx.save();
            ctx.translate(bird.x, bird.y);
            
            // Bird body (yellow)
            ctx.fillStyle = '#FFD54F';
            ctx.beginPath();
            ctx.ellipse(0, 0, bird.size, bird.size * 0.75, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Wing
            ctx.fillStyle = '#FFA726';
            ctx.beginPath();
            ctx.ellipse(-8, 0, 14, 10, Math.sin(frame / 5) * 0.3, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(8, -5, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(10, -5, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Beak
            ctx.fillStyle = '#FF7043';
            ctx.beginPath();
            ctx.moveTo(22, -3);
            ctx.lineTo(32, 0);
            ctx.lineTo(22, 3);
            ctx.fill();
            
            ctx.restore();
        }
        
        function drawPipes() {
            ctx.fillStyle = '#4CAF50';
            ctx.strokeStyle = '#2E7D32';
            ctx.lineWidth = 3;
            
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                ctx.strokeRect(pipe.x, 0, PIPE_WIDTH, pipe.topHeight);
                
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.bottomY, PIPE_WIDTH, canvas.height - pipe.bottomY);
                ctx.strokeRect(pipe.x, pipe.bottomY, PIPE_WIDTH, canvas.height - pipe.bottomY);
                
                // Pipe caps
                ctx.fillStyle = '#66BB6A';
                ctx.fillRect(pipe.x - 4, pipe.topHeight - 25, PIPE_WIDTH + 8, 25);
                ctx.fillRect(pipe.x - 4, pipe.bottomY, PIPE_WIDTH + 8, 25);
                ctx.fillStyle = '#4CAF50';
            });
        }
        
        function update() {
            if (!gameRunning) return;
            
            frame++;
            
            // Bird physics
            bird.velocity += GRAVITY;
            bird.y += bird.velocity;
            
            // Ground collision
            if (bird.y + bird.size > canvas.height - 20) {
                endGame();
                return;
            }
            
            // Ceiling
            if (bird.y - bird.size < 0) {
                bird.y = bird.size;
                bird.velocity = 0;
            }
            
            // Pipes
            if (frame % 90 === 0) {
                createPipe();
            }
            
            for (let i = pipes.length - 1; i >= 0; i--) {
                const pipe = pipes[i];
                pipe.x -= PIPE_SPEED;
                
                // Score
                if (!pipe.scored && pipe.x + PIPE_WIDTH < bird.x) {
                    pipe.scored = true;
                    score++;
                    document.getElementById('score').innerText = score;
                }
                
                // Collision
                if (bird.x + bird.size > pipe.x && bird.x - bird.size < pipe.x + PIPE_WIDTH) {
                    if (bird.y - bird.size < pipe.topHeight || bird.y + bird.size > pipe.bottomY) {
                        endGame();
                        return;
                    }
                }
                
                // Remove off-screen pipes
                if (pipe.x + PIPE_WIDTH < 0) {
                    pipes.splice(i, 1);
                }
            }
        }
        
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawBackground();
            drawPipes();
            drawBird();
            
            // Ground
            ctx.fillStyle = '#8BC34A';
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);
            ctx.fillStyle = '#689F38';
            ctx.fillRect(0, canvas.height - 25, canvas.width, 5);
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }
        
        function startGame() {
            resetGame();
            gameRunning = true;
            
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').classList.add('hidden');
            document.getElementById('score').classList.remove('hidden');
            
            // Create first pipes
            pipes = [];
            createPipe();
            createPipe();
            pipes[1].x = canvas.width * 1.5;
            
            gameLoop();
        }
        
        function endGame() {
            gameRunning = false;
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('skyHopperHighScore', highScore);
            }
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').classList.remove('hidden');
            document.getElementById('score').classList.add('hidden');
        }
        
        function flap() {
            if (!gameRunning) {
                startGame();
                return;
            }
            bird.velocity = FLAP_STRENGTH;
        }
        
        // Event Listeners
        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('restart-btn').addEventListener('click', startGame);
        
        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flap();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                flap();
            }
        });
        
        // Initial draw
        draw();
        
        // Show start screen
        document.getElementById('start-screen').classList.remove('hidden');
    </script>
</body>
</html>
